name: web-tests

on:
  push:
    paths:
      - 'web/**'
      - 'tests/fixtures/**'
      - 'data/**'
      - '.github/workflows/web-tests.yml'
  pull_request:
    paths:
      - 'web/**'
      - 'tests/fixtures/**'
      - 'data/**'
      - '.github/workflows/web-tests.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npm run check
      - run: npm run test
      - run: npm run build
